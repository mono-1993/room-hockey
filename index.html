<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Room Hockey</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main id="app">
    <section id="lobby" class="panel">
      <h1>Room Hockey</h1>
      <p>ルームURLを共有して、同じ試合に参加できます。</p>

      <label class="name-field">
        名前
        <input id="nameInput" maxlength="12" autocomplete="off">
      </label>

      <div class="settings-grid">
        <label class="setting-card">
          ゲームセット
          <input id="winScoreInput" type="number" min="1" max="99" value="20" inputmode="numeric">
        </label>

        <div class="setting-card">
          参加チーム
          <div class="team-picker">
            <button id="teamAButton" type="button" class="team-choice active">Team A</button>
            <button id="teamBButton" type="button" class="team-choice">Team B</button>
          </div>
        </div>
      </div>

      <div class="room-box">
        <span>Room URL</span>
        <input id="roomUrl" readonly>
        <button id="copyButton" type="button">コピー</button>
      </div>

      <div class="cpu-box">
        <div>
          <strong>CPU</strong>
          <span>チームごとにCPU人数を選択できます。合計6人まで。</span>
        </div>
        <div class="cpu-teams">
          <label class="cpu-stepper">
            <span>Team A</span>
            <button id="cpuAMinus" type="button" aria-label="Team A CPUを減らす">-</button>
            <input id="cpuAInput" type="number" min="0" max="6" value="0" inputmode="numeric">
            <button id="cpuAPlus" type="button" aria-label="Team A CPUを増やす">+</button>
          </label>
          <label class="cpu-stepper">
            <span>Team B</span>
            <button id="cpuBMinus" type="button" aria-label="Team B CPUを減らす">-</button>
            <input id="cpuBInput" type="number" min="0" max="6" value="0" inputmode="numeric">
            <button id="cpuBPlus" type="button" aria-label="Team B CPUを増やす">+</button>
          </label>
        </div>
      </div>

      <div id="status" class="status">接続準備中...</div>
      <div class="action-row">
        <button id="joinButton" type="button" class="secondary">参加</button>
        <button id="startButton" type="button" class="primary" disabled>ゲーム開始</button>
      </div>
      <div id="players" class="players"></div>
    </section>

    <section id="game" class="game hidden">
      <canvas id="gameCanvas"></canvas>
      <div id="hud" class="hud"></div>
      <div id="touchPad" class="touch-pad">
        <div id="stick" class="stick"></div>
      </div>
      <button id="powerButton" class="power-button" type="button">POWER</button>
      <button id="replayButton" class="replay-button hidden" type="button">もう一度遊ぶ</button>
      <button id="rulesButton" class="rules-button hidden" type="button">ルール設定変更</button>
      <button id="leaveButton" class="leave-button" type="button">退出</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
